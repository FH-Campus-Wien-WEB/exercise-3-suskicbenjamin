<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Movie</title>

  <link rel="stylesheet" href="edit.css">
  <script src="edit.js"></script>
</head>

<body>

  <h1>Edit Movie</h1>

  <form>

    <!-- Hidden imdbID -->
    <input type="hidden" id="imdbID">

    <!-- Title -->
    <div>
      <label for="title">Title</label>
      <input type="text" id="title" required>
    </div>

    <!-- Released -->
    <div>
      <label for="released">Released</label>
      <input type="date" id="released" required>
    </div>

    <!-- Runtime -->
    <div>
      <label for="runtime">Runtime</label>
      <input type="number" id="runtime" required>
    </div>

    <!-- Genres -->
    <div>
      <label for="genres">Genres</label>
      <select id="genres" multiple required>
        <option value="Action">Action</option>
        <option value="Adventure">Adventure</option>
        <option value="Animation">Animation</option>
        <option value="Biography">Biography</option>
        <option value="Comedy">Comedy</option>
        <option value="Crime">Crime</option>
        <option value="Documentary">Documentary</option>
        <option value="Drama">Drama</option>
        <option value="Family">Family</option>
        <option value="Fantasy">Fantasy</option>
        <option value="Film Noir">Film Noir</option>
        <option value="History">History</option>
        <option value="Horror">Horror</option>
        <option value="Music">Music</option>
        <option value="Musical">Musical</option>
        <option value="Mystery">Mystery</option>
        <option value="Romance">Romance</option>
        <option value="Sci-Fi">Sci-Fi</option>
        <option value="Short Film">Short Film</option>
        <option value="Sport">Sport</option>
        <option value="Superhero">Superhero</option>
        <option value="Thriller">Thriller</option>
        <option value="War">War</option>
        <option value="Western">Western</option>
      </select>
    </div>

    <!-- Directors -->
    <div>
      <label for="directors">Directors</label>
      <input type="text" id="directors" required>
    </div>

    <!-- Writers -->
    <div>
      <label for="writers">Writers</label>
      <input type="text" id="writers" required>
    </div>

    <!-- Actors -->
    <div>
      <label for="actors">Actors</label>
      <input type="text" id="actors" required>
    </div>

    <!-- Poster -->
    <div>
      <label for="poster">Poster URL</label>
      <input type="url" id="poster" required>
    </div>

    <!-- Metascore -->
    <div>
      <label for="metascore">Metascore</label>
      <input type="number" id="metascore" required>
    </div>

    <!-- IMDb Rating -->
    <div>
      <label for="imdbRating">IMDb Rating</label>
      <input type="number" step="0.1" id="imdbRating" required>
    </div>

    <!-- Plot -->
    <div>
      <label for="plot">Plot</label>
      <textarea id="plot" rows="5" required></textarea>
    </div>

    <!-- Buttons -->
    <div>
      <button type="button" onclick="putMovie()">Save</button>
      <button type="button" onclick="location.href='index.html'">Cancel</button>
    </div>

  </form>

</body>

</html>
